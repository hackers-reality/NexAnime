<!doctype html>
<html lang="en" data-theme="midnight">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#05070c" />
    <title>nexanime</title>
    <meta
      name="description"
      content="A premium full-stack selfhosted anime streaming clone with watch history, account syncing, and live scrapers."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
    <link rel="stylesheet" href="./styles.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="ambient ambient-a"></div>
    <div class="ambient ambient-b"></div>

    <header class="topbar">
      <button class="icon-button" id="menuButton" type="button" aria-label="Open menu">&#9776;</button>
      
      <div class="brand" style="display: flex; align-items: center; gap: 12px;">
        <a class="brand" href="#/home" aria-label="nexanime home">
          <span class="brand-mark">N</span>
          <span class="brand-copy">
            <strong>NEXANIME</strong>
            <small>Anime vault</small>
          </span>
        </a>
        <nav class="breadcrumbs" id="headerBreadcrumbs" style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: var(--muted); margin-left: 12px;"></nav>
      </div>

      <nav class="topnav" aria-label="Primary" style="display: none;"></nav> <!-- Hidden to match screenshot header clean layout -->

      <div class="top-actions" style="margin-left: auto;">
        <label class="search">
          <span class="sr-only">Search titles</span>
          <input id="searchInput" type="search" placeholder="Search..." />
        </label>
        
        <div style="position: relative; display: inline-block;">
          <button class="icon-button" id="notifButton" type="button" aria-label="Notifications" style="position: relative;">
            &#128276;
            <span class="notif-badge" id="notifBadge" style="position: absolute; top: -4px; right: -4px; background: var(--danger); color: #fff; font-size: 0.65rem; font-weight: 700; width: 18px; height: 18px; border-radius: 50%; display: none; place-items: center;">0</span>
          </button>
          
          <!-- Notifications Popover -->
          <div class="popover-container notif-popover hidden" id="notifPopover">
            <div class="notif-header">
              <strong>Notifications</strong>
              <button id="markAllReadBtn" style="background: transparent; border: 0; color: var(--accent); font-size: 0.8rem; cursor: pointer;">Mark all as read</button>
            </div>
            <div class="notif-tabs">
              <button class="notif-tab active" data-notif-tab="all">All</button>
              <button class="notif-tab" data-notif-tab="unread">Unread</button>
              <button class="notif-tab" data-notif-tab="mentions">Mentions</button>
              <button class="notif-tab" data-notif-tab="updates">Updates</button>
            </div>
            <div class="notif-list" id="notifList"></div>
          </div>
        </div>

        <div style="position: relative; display: inline-block;">
          <button class="icon-button" id="accountButton" type="button" aria-label="Account">&#9786;</button>
          
          <!-- User Menu Popover -->
          <div class="popover-container user-menu-popover hidden" id="userMenuPopover">
            <div class="menu-list">
              <button class="menu-item" id="menuPublicProfileBtn">Public Profile</button>
              <button class="menu-item" id="menuEditProfileBtn">Edit Profile</button>
              <button class="menu-item" id="menuSettingsBtn">Settings</button>
              <button class="menu-item danger" id="menuSignOutBtn">Sign out</button>
            </div>
          </div>
        </div>
      </div>
    </header>

    <main id="app" class="app-shell" aria-live="polite"></main>

    <!-- Global Modals & Overlays -->
    <div class="backdrop" id="backdrop" hidden></div>
    
    <!-- Library Edit Details Modal -->
    <div class="edit-library-modal" id="editLibraryModal" style="display: none;">
      <div class="edit-library-layout">
        <div class="edit-library-poster" id="editLibPoster"></div>
        <form class="edit-library-form" id="editLibForm">
          <h3 id="editLibTitle" style="margin: 0; font-family: 'Fraunces', Georgia, serif; font-size: 1.4rem;">Edit</h3>
          
          <div class="edit-library-fields">
            <label>
              <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">Status</span>
              <select class="field" name="status" style="width: 100%; padding: 8px; border-radius: 8px;">
                <option value="Plan to watch">Plan to watch</option>
                <option value="Watching">Watching</option>
                <option value="Finished">Finished</option>
                <option value="On hold">On hold</option>
                <option value="Dropped">Dropped</option>
              </select>
            </label>
            <label>
              <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">Start date</span>
              <input class="field" type="date" name="start_date" style="width: 100%; padding: 8px; border-radius: 8px;" />
            </label>
            <label>
              <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">End date</span>
              <input class="field" type="date" name="end_date" style="width: 100%; padding: 8px; border-radius: 8px;" />
            </label>
          </div>

          <div class="edit-library-fields">
            <label>
              <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">Score</span>
              <input class="field" type="number" name="score" min="0" max="100" style="width: 100%; padding: 8px; border-radius: 8px;" />
            </label>
            <label>
              <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">Episode watched</span>
              <input class="field" type="number" name="currentEpisode" min="0" style="width: 100%; padding: 8px; border-radius: 8px;" />
            </label>
            <label>
              <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">Total rewatches</span>
              <input class="field" type="number" name="rewatched" min="0" style="width: 100%; padding: 8px; border-radius: 8px;" />
            </label>
          </div>

          <label>
            <span class="label" style="font-size: 0.8rem; display: block; margin-bottom: 6px;">Notes</span>
            <textarea class="field" name="notes" placeholder="Add a note." style="width: 100%; min-height: 80px; padding: 10px; border-radius: 12px; resize: vertical;"></textarea>
          </label>

          <div class="player-row space" style="margin-top: 10px; justify-content: flex-end;">
            <button class="secondary-button" id="closeEditLibBtn" type="button">Cancel</button>
            <button class="primary-button" type="submit" style="margin-left: 10px;">Save changes</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Floating MiniPlayer -->
    <div class="mini-player-container hidden" id="miniPlayer">
      <div class="mini-player-frame">
        <video id="miniVideoPlayer" playsinline muted></video>
        <div class="mini-player-controls">
          <div class="mini-player-row">
            <button id="miniPlayerClose" type="button" aria-label="Close">x</button>
            <button id="miniPlayerExpand" type="button" aria-label="Expand">⛶</button>
          </div>
          <div class="mini-player-row">
            <button id="miniPlayerPlay" type="button">▶</button>
            <span class="mini-player-time" id="miniPlayerTime">0:00 / 0:00</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Drawers & Toast Containers -->
    <aside class="drawer auth-drawer" id="authDrawer" aria-hidden="true"></aside>
    <div id="toastStack" class="toast-stack" aria-live="assertive"></div>

    <div class="loader" id="loader">
      <div class="loader-logo">A</div>
      <div class="loader-track"><div class="loader-bar"></div></div>
    </div>
  </body>
</html>
